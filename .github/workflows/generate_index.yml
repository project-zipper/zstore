name: Generate ZipperOS AppStore JSON

# Trigger manually or when APKs change
on:
  workflow_dispatch:
  push:
    paths:
      - 'apks/**'
      - '.github/workflows/generate_index.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3️⃣ Run the generator script
      - name: Run generate_index.py
        run: python generate_index.py

      # 4️⃣ Commit and push updated index.json using GITHUB_TOKEN
      - name: Commit generated index.json
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "Update index.json"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
