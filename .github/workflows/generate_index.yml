name: Generate AppStore JSON

on:
  push:
    paths:
      - 'apks/**'       # run when APKs change
      - '.github/workflows/generate_index.yml'
  workflow_dispatch:   # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"

    - name: Install dependencies
      run: pip install requests

    - name: Run JSON generator
      run: python generate_index.py

    - name: Commit index.json
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"
        git add index.json
        git commit -m "Update index.json"
        git push
      continue-on-error: true   # won't fail if nothing changed
