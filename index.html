<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZStore</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

h1 {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 150px);
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
}

.card img {
    width: 80px;
    border-radius: 15px;
}

button {
    margin-top: 10px;
    padding: 8px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>ZStore</h1>
<div class="grid" id="apps"></div>

<script>
// List your apps folder names here (auto-detecting folders in plain HTML/JS isn’t possible)
const appFolders = [
    "orkut",
    "nes-emulator",
    "dos-app"
];

function loadApps() {
    const container = document.getElementById("apps");

    appFolders.forEach(folder => {
        const basePath = `apps/${folder}/`; // relative path to the app folder
        fetch(basePath + "app.json")
            .then(res => res.json())
            .then(app => {
                const card = document.createElement("div");
                card.className = "card";

                const logo = basePath + "logo.png";

                card.innerHTML = `
                    <img src="${logo}">
                    <h3>${app.name}</h3>
                    <button onclick='installApp("${basePath}", ${JSON.stringify(app.platforms)})'>
                        Install
                    </button>
                `;
                container.appendChild(card);
            })
            .catch(err => console.log("Failed to load app:", folder));
    });
}

function installApp(basePath, platforms) {
    let platform = "android";
    const ua = navigator.userAgent;

    if (ua.includes("Windows")) platform = "windows";
    else if (ua.includes("Mac")) platform = "mac";
    else if (ua.includes("Linux")) platform = "linux";

    const file = platforms?.[platform];

    if (file) {
        window.location.href = basePath + file;
    } else if (platforms?.sh) {
        // ZipperOS custom installer
        window.location.href = "zstore://install?script=" + encodeURIComponent(basePath + platforms.sh);
    } else {
        alert("No compatible version for your platform");
    }
}

loadApps();
</script>

</body>
</html>
