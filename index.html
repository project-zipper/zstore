<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZStore</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

h1 {
    padding: 20px;
    text-align: center;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 150px);
    gap: 20px;
    padding: 20px;
    justify-content: center;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
}

.card img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 15px;
}

button {
    margin-top: 10px;
    padding: 8px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #45a049;
}
</style>
</head>
<body>

<h1>ZStore</h1>
<div class="grid" id="apps"></div>

<script>
// Fetch apps from dynamically generated apps/index.json
async function loadApps() {
    try {
        const res = await fetch("apps/index.json");
        const appFolders = await res.json(); // ["orkut", "dos-app", ...]

        const container = document.getElementById("apps");

        for (const folder of appFolders) {
            const basePath = `apps/${folder}/`;
            try {
                const appRes = await fetch(basePath + "app.json");
                const app = await appRes.json();

                const logo = app.logo ? basePath + app.logo : basePath + "logo.png";
                const name = app.name || folder;
                const desc = app.description || "";

                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <img src="${logo}" alt="${name}">
                    <h3>${name}</h3>
                    <p>${desc}</p>
                    <button onclick='installApp("${basePath}", ${JSON.stringify(app.platforms || {})})'>
                        Install
                    </button>
                `;

                container.appendChild(card);
            } catch {
                console.log("Failed to load app.json for", folder);
            }
        }
    } catch {
        console.log("Failed to load apps/index.json. Make sure it exists!");
    }
}

function installApp(basePath, platforms) {
    // Determine platform
    let platform = "android";
    const ua = navigator.userAgent;

    if (ua.includes("Windows")) platform = "windows";
    else if (ua.includes("Mac")) platform = "mac";
    else if (ua.includes("Linux")) platform = "linux";

    const file = platforms?.[platform];

    if (file) {
        window.location.href = basePath + file;
    } else if (platforms?.sh) {
        // ZipperOS custom installer
        window.location.href = "zstore://install?script=" + encodeURIComponent(basePath + platforms.sh);
    } else {
        alert("No compatible version found for your platform");
    }
}

// Load apps on page load
loadApps();
</script>

</body>
</html>
