<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZipperOS App Store</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    background-color: #f0f2f5;
    color: #333;
  }
  header {
    background-color: #0078d4;
    color: white;
    padding: 1rem;
    text-align: center;
    font-size: 1.5rem;
    font-weight: bold;
  }
  main {
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 800px;
    margin: auto;
  }
  .app-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 80vh;
    overflow-y: auto;
    padding-right: 0.5rem;
  }
  .app-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    background-color: white;
    padding: 0.5rem;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }
  .app-item:hover {
    transform: translateY(-2px);
  }
  .app-icon {
    width: 64px;
    height: 64px;
    object-fit: contain;
    border-radius: 12px;
    background-color: #eee;
  }
  .app-info {
    flex: 1;
  }
  .app-info h3 {
    margin: 0;
    font-size: 1.1rem;
  }
  .app-info p {
    margin: 0.2rem 0 0 0;
    font-size: 0.85rem;
    color: #666;
  }
  .download-btn {
    background-color: #0078d4;
    color: white;
    padding: 0.5rem 0.75rem;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
  }
  .download-btn:hover {
    background-color: #005a9e;
  }
</style>
</head>
<body>

<header>ZipperOS App Store</header>
<main>
  <div class="app-list" id="appList"></div>
</main>

<script>
  async function loadApps() {
    const response = await fetch('index.json');
    const data = await response.json();
    const appList = document.getElementById('appList');
    appList.innerHTML = '';

    data.apps.forEach(app => {
      // Use icon if exists, otherwise fallback
      const iconPath = app.icon ? app.icon : 'icons/default.png';
      const appItem = document.createElement('div');
      appItem.className = 'app-item';

      appItem.innerHTML = `
        <img src="${iconPath}" alt="${app.name}" class="app-icon" onerror="this.src='icons/default.png'">
        <div class="app-info">
          <h3>${app.name}</h3>
          <p>Category: ${app.category} | Version: ${app.version}</p>
        </div>
        <a href="${app.apk}" class="download-btn" download>Install</a>
      `;
      appList.appendChild(appItem);
    });
  }

  loadApps();
</script>

</body>
</html>
