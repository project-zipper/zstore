<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZipperOS App Store</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
  }
  header {
    background: #1a73e8;
    color: white;
    padding: 1rem;
    text-align: center;
    font-size: 1.5rem;
  }
  #app-list {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    padding: 1rem;
    justify-content: center;
  }
  .app {
    background: white;
    width: 120px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    padding: 0.5rem;
    font-size: 0.85rem;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .app:hover {
    transform: scale(1.05);
  }
  .app img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    margin-bottom: 0.5rem;
  }
  .app-name {
    font-weight: bold;
    margin-bottom: 0.25rem;
  }
  .app-version {
    color: #555;
  }
</style>
</head>
<body>
<header>ZipperOS App Store</header>
<div id="app-list"></div>

<script>
const chunks = 17; // number of chunks
const appList = document.getElementById("app-list");

async function loadApps() {
  for (let i = 1; i <= chunks; i++) {
    try {
      const res = await fetch(`index-${i}.json`);
      const data = await res.json();
      data.apps.forEach(app => {
        const appDiv = document.createElement("div");
        appDiv.className = "app";

        const iconPath = app.icon || `icons/default.png`;

        appDiv.innerHTML = `
          <img src="${iconPath}" alt="${app.name} icon">
          <div class="app-name">${app.name}</div>
          <div class="app-version">${app.version}</div>
        `;

        // Download link for APK
        appDiv.onclick = () => {
          window.location.href = app.apk;
        };

        appList.appendChild(appDiv);
      });
    } catch (e) {
      console.error(`Failed to load index-${i}.json`, e);
    }
  }
}

loadApps();
</script>
</body>
</html>
